    <script>
      
        // ===== 用户登录状态 =====
    const userArea = document.querySelector('.user-area');
    const loginBtn = document.querySelector('.login-btn');
    const isLoggedIn = true; // 改为 true 查看已登录效果

    userArea.classList.toggle('logged-in', isLoggedIn);
    userArea.classList.toggle('logged-out', !isLoggedIn);

    loginBtn?.addEventListener('click', () => {
      window.location.href = './login.html';
    });
   
    // ===== 下拉框 =====
    const dropdownToggle = document.querySelector('.dropdown-toggle');
    const dropdownMenu = document.querySelector('.dropdown-menu');
    dropdownToggle.addEventListener('click', function(e) {
      e.preventDefault();
      dropdownMenu.classList.toggle('show');
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.dropdown')) {
        dropdownMenu.classList.remove('show');
      }
    });

    // ===== 右侧悬浮菜单 =====
    const trigger = document.getElementById('sideMenuTrigger');
    const sideMenu = document.getElementById('sideMenu');

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      sideMenu.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!sideMenu.contains(e.target) && !trigger.contains(e.target)) {
        sideMenu.classList.remove('open');
      }
    });

    // 点击菜单项后自动关闭
    document.querySelectorAll('.side-item').forEach(item => {
      item.addEventListener('click', () => sideMenu.classList.remove('open'));
    });

        // 图片配置：key对应卡片data-pattern，value是你的本地图片路径
        const patternImages = {
            feitian: "feitian.jpg",
            qinghua: "qinghua.jpg",
            papercut: "jianzhi.jpg",
            brocade: "yunjin.jpg"
        };

        let currentPattern = "feitian";
        let size = 3;
        let tiles = [];
        let emptyIndex;
        let moves = 0;
        let timerInterval;
        let seconds = 0;
        let gameStarted = false;

        const gameBoard = document.getElementById("gameBoard");
        const movesEl = document.getElementById("moves");
        const timerEl = document.getElementById("timer");
        const shuffleBtn = document.getElementById("shuffleBtn");
        const hintBtn = document.getElementById("hintBtn");
        const difficultySelect = document.getElementById("difficulty");
        const patternCards = document.querySelectorAll(".pattern-card");
        const winModal = document.getElementById("winModal");
        const finalTimeEl = document.getElementById("finalTime");
        const finalMovesEl = document.getElementById("finalMoves");
        const playAgainBtn = document.getElementById("playAgainBtn");

        // 初始化游戏
        function initGame() {
            size = parseInt(difficultySelect.value);
            tiles = [];
            moves = 0;
            seconds = 0;
            gameStarted = false;
            clearInterval(timerInterval);
            movesEl.textContent = "0";
            timerEl.textContent = "00:00";

            // 创建有序数组，最后一个位置为空
            for (let i = 0; i < size * size - 1; i++) {
                tiles.push(i + 1);
            }
            tiles.push(0);
            emptyIndex = tiles.length - 1;

            renderBoard();
        }

        // 绘制游戏面板（图片带数字版本）
        function renderBoard() {
            gameBoard.innerHTML = "";
            // 统一格子大小，4x4时也使用100px
             const tileSize = 100;
             gameBoard.style.gridTemplateColumns = `repeat(${size}, ${tileSize}px)`;
             gameBoard.style.gap = "2px";

             const imgSrc = patternImages[currentPattern];

             tiles.forEach((value, index) => {
             const tile = document.createElement("div");
             tile.className = "tile";
             tile.dataset.index = index;
        
             // 统一设置宽高
             tile.style.width = `${tileSize}px`;
             tile.style.height = `${tileSize}px`;

             if (value === 0) {
             tile.classList.add("empty");
             tile.style.backgroundColor = "#1a0f0a";
             tile.style.border = "none";
            } else {
             // 计算当前格子对应的原始图片中的位置
             const row = Math.floor((value - 1) / size);
             const col = (value - 1) % size;
            
             // 关键：背景图片的总宽度 = size * tileSize
             // 每个格子显示图片的对应区域
             const bgX = col * tileSize;
             const bgY = row * tileSize;
            
             tile.style.backgroundImage = `url('${imgSrc}')`;
             tile.style.backgroundSize = `${size * tileSize}px ${size * tileSize}px`;
             tile.style.backgroundPosition = `-${bgX}px -${bgY}px`;
             tile.style.backgroundRepeat = "no-repeat";
             tile.style.backgroundColor = "#2a1a0f";
            
             // 可选：显示数字（调试用）
             tile.style.display = "flex";
             tile.style.alignItems = "center";
             tile.style.justifyContent = "center";
             tile.style.color = "rgba(255,255,255,1)";
             tile.style.fontSize = "25px";
             tile.style.fontWeight = "bold";
             tile.style.textShadow = "1px 1px 0 #000";
             tile.textContent = value;

             tile.addEventListener("click", () => moveTile(index));
            }

            gameBoard.appendChild(tile);
           });
         }


        // 移动方块
        function moveTile(index) {
            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            if (canMove(index)) {
                // 交换位置
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                emptyIndex = index;
                moves++;
                movesEl.textContent = moves;
                renderBoard();
                checkWin();
            }
        }

        // 检查是否可以移动
        function canMove(index) {
            const row = Math.floor(index / size);
            const col = index % size;
            const emptyRow = Math.floor(emptyIndex / size);
            const emptyCol = emptyIndex % size;

            return (
                (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                (Math.abs(col - emptyCol) === 1 && row === emptyRow)
            );
        }

        // 打乱方块（保证有解的打乱算法）
        function shuffleTiles() {
            const shuffleMoves = size * size * 20;
            for (let i = 0; i < shuffleMoves; i++) {
                const neighbors = getNeighbors(emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyIndex], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIndex]];
                emptyIndex = randomNeighbor;
            }
            moves = 0;
            seconds = 0;
            movesEl.textContent = "0";
            timerEl.textContent = "00:00";
            gameStarted = false;
            clearInterval(timerInterval);
            renderBoard();
        }

        // 获取空位置的相邻方块索引
        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / size);
            const col = index % size;

            if (row > 0) neighbors.push(index - size);
            if (row < size - 1) neighbors.push(index + size);
            if (col > 0) neighbors.push(index - 1);
            if (col < size - 1) neighbors.push(index + 1);

            return neighbors;
        }

        // 开始计时
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
                const secs = (seconds % 60).toString().padStart(2, "0");
                timerEl.textContent = `${mins}:${secs}`;
            }, 1000);
        }

        // 检查是否胜利
        function checkWin() {
            for (let i = 0; i < tiles.length - 1; i++) {
                if (tiles[i] !== i + 1) return;
            }
            clearInterval(timerInterval);
            showWinModal();
        }

        // 显示胜利弹窗
        function showWinModal() {
            const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
            const secs = (seconds % 60).toString().padStart(2, "0");
            finalTimeEl.textContent = `${mins}:${secs}`;
            finalMovesEl.textContent = moves;
            winModal.classList.add("active");
        }

        // 提示功能
        function showHint() {
            // 高亮可移动的方块
            const neighbors = getNeighbors(emptyIndex);
            const tilesEl = document.querySelectorAll(".tile:not(.empty)");
            tilesEl.forEach(tile => {
                tile.classList.remove("highlight");
                if (neighbors.includes(parseInt(tile.dataset.index))) {
                    tile.classList.add("highlight");
                    setTimeout(() => tile.classList.remove("highlight"), 1500);
                }
            });
        }

        // 事件监听
        shuffleBtn.addEventListener("click", shuffleTiles);
        hintBtn.addEventListener("click", showHint);
        difficultySelect.addEventListener("change", initGame);
        playAgainBtn.addEventListener("click", () => {
            winModal.classList.remove("active");
            initGame();
            shuffleTiles();
        });

        patternCards.forEach(card => {
            card.addEventListener("click", () => {
                patternCards.forEach(c => c.classList.remove("selected"));
                card.classList.add("selected");
                currentPattern = card.dataset.pattern;
                renderBoard();
            });
        });

        // 初始化游戏
        initGame();
        shuffleTiles();
        function goMyPage() {
  location.href = "../个人主页/index.html";
}
    </script>
</body>
</html>

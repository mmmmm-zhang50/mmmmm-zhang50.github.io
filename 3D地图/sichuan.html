<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    overflow: hidden;
  }

  .title {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #f6dead;
    background-size: contain;
    color: #000;
    font-size: 35px;
    font-weight: bold;
    text-align: center;
    padding: 10px 0;
    z-index: 999;
  }

  .circle-btn {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.5s ease;
    position: fixed;
    top: 52px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
  }
  .circle-btn img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
  }

  .circle-btn.active {
    transform: translateX(-50%) rotate(180deg);
  }

  .nav-bar {
    position: fixed;
    top: 65px;
    left: 50%;
    transform: translateX(-50%);
    background: #dfb5b5;
    padding: 12px 30px;
    border-radius: 25px;
    display: flex;
    gap: 40px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 99;
  }

  @keyframes floatUpDown {
    0% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-5px); }
    100% { transform: translateX(-50%) translateY(0); }
  }

  .circle-btn {
    animation: floatUpDown 2s ease-in-out infinite;
  }

  .nav-bar.show {
    opacity: 1;
    pointer-events: all;
  }

  .nav-item {
    color: #252424;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
  }

  .nav-item.active {
    width: 75px;
    background: rgba(162, 26, 5, 0.811);
    text-align: center;
    border-radius: 30px;
    font-weight: bold;
    color: #f0f0f0;
  }

  .content {
    position: relative;
    color: #000;
    font-size: 20px;
    text-align: center;
    margin-top: 100px;
    z-index: 10;
  }

  .circle-wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vmax;
    height: 100vmax;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: rotateAll 1.2s ease-in-out forwards;
    pointer-events: none;
  }

  .circle {
    width: 100%;
    height: 100%;
    display: flex;
  }

  .half-left, .half-right {
    width: 50%;
    height: 100%;
  }

  .half-left {
    /* transform: translateX(-40px); */
    border-radius: 100vh 0 0 100vh;
    background-image: url('./se-07.png');
    background-repeat: no-repeat;
    background-size: cover;
    animation: moveLeft 1s ease-in-out 1.2s forwards;
  }

  .half-right {
    /* transform: translateX(40px); */
    border-radius: 0 100vh 100vh 0;
    background-image: url('./se-06.png');
    background-repeat: no-repeat;
    background-size: cover;
    background-repeat: no-repeat;
    animation: moveRight 1s ease-in-out 1.2s forwards;
  }

  @keyframes rotateAll {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
  }

  @keyframes moveLeft {
    0% { transform: translateX(0); }
    100% { transform: translateX(85vw); }
  }

  @keyframes moveRight {
    0% { transform: translateX(0); }

    const wrapper = document.querySelector('.carousel-wrapper .wrapper');
    let i = 0;

    function update() {
      section.style.backgroundImage = `url(${sliderData[i].color})`;
      section.style.backgroundSize = 'cover';
      section.style.backgroundPosition = 'center';
      section.style.backgroundRepeat = 'no-repeat';
      text.innerHTML = sliderData[i].text;
      lis.forEach((li, idx) => li.classList.toggle('active', idx === i));
    }
    update();

    prev.addEventListener('click', (e) => {
      e.stopPropagation();
      i--;
      if (i < 0) i = sliderData.length - 1;
      update();
    });
    next.addEventListener('click', (e) => {
      e.stopPropagation();
      i++;
      if (i >= sliderData.length) i = 0;
      update();
    });

    let timer = setInterval(() => next.click(), 2000);
    const center = document.querySelector('.carousel-wrapper .center');
    center.addEventListener('mouseenter', () => clearInterval(timer));
    center.addEventListener('mouseleave', () => timer = setInterval(() => next.click(), 2000));

    // 完全还原你原版：点击放大，点空白缩小
    wrapper.addEventListener('click', (e) => {
      e.stopPropagation();
      wrapper.classList.add('show');
    });
    document.body.addEventListener('click', () => {
      wrapper.classList.remove('show');
    });
  }, 0);
}

function getFilteredData() {
  const type = document.getElementById('s_type').value;
  const year = document.getElementById('s_year').value;
  const key = document.getElementById('s_key').value.toLowerCase();
  return allData.filter(item => {
    return (!type || item.type === type) &&
           (!year || item.year.includes(year)) &&
           (!key || item.name.toLowerCase().includes(key));
  });
}

function renderTable() {
  const list = getFilteredData();
  const total = list.length;
  const totalPage = Math.ceil(total / pageSize);
  if (currentPage < 1) currentPage = 1;
  if (currentPage > totalPage) currentPage = Math.max(1, totalPage);

  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  const pageData = list.slice(start, end);

  const html = pageData.map(item => `
  <tr>
    <td>${item.no}</td>
    <td>${item.code}</td>
    <td>${item.name}</td>
    <td>${item.type}</td>
    <td>${item.year}</td>
    <td>${item.org}</td>
  </tr>`).join('');

  document.getElementById('table_body').innerHTML = html;
}

function doSearch() {
  currentPage = 1;
  renderTable();
}

function prevPage() {
  currentPage--;
  renderTable();
}

function nextPage() {
  currentPage++;
  renderTable();
}
</script>

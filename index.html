<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非遗传承 · 匠心登录</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"KaiTi","STKaiti","SimSun",serif;
}
body{
  height:100vh;
  overflow:hidden;
}
.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.6));
  z-index:-1;
}
.login-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:440px;
  width:90%;
  padding:50px 40px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,210,170,0.3);
  border-radius:24px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  color:#ffd7a7;
  cursor:pointer;
}
.title{
  text-align:center;
  margin-bottom:40px;
  position:relative;
}
.title h2{
  font-size:34px;
  letter-spacing:5px;
  background:linear-gradient(135deg,#ffd7a7,#ffc183);
  background-clip:text;
}
.title::after{
  content:'';
  position:absolute;
  bottom:-15px;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:2px;
  background:linear-gradient(90deg,transparent,#ffd7a7,transparent);
}
.input-item{
  margin-bottom:28px;
}
.input-item label{
  display:block;
  font-size:15px;
  margin-bottom:8px;
  padding-left:6px;
  color:rgba(255,210,170,0.7);
  border-left:3px solid rgba(255,210,170,0.5);
  letter-spacing:1px;
}
.input-item input{
  width:100%;
  padding:15px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,210,170,0.25);
  border-radius:12px;
  outline:none;
  color:#fff;
  font-size:16px;
}
.input-item input:focus{
  border-color:rgba(255,210,170,0.6);
  box-shadow:0 0 10px rgba(255,210,170,0.15);
}
.input-item input::placeholder{
  color:rgba(255,210,170,0.45);
}
.login-btn{
  width:100%;
  padding:16px;
  background:linear-gradient(135deg,rgba(255,190,120,0.3),rgba(230,150,70,0.3));
  border:1px solid rgba(255,190,120,0.4);
  border-radius:12px;
  color:#ffd7a7;
  font-size:18px;
  letter-spacing:3px;
  cursor:pointer;
  transition:0.3s;
}
.login-btn:hover{
  background:linear-gradient(135deg,rgba(255,190,120,0.4),rgba(230,150,70,0.4));
  box-shadow:0 6px 18px rgba(255,190,120,0.15);
}
.tip{
  text-align:center;
  margin-top:25px;
  font-size:13px;
  color:rgba(255,210,170,0.4);
  letter-spacing:2px;
}
.tip::before,
.tip::after{
  content:'❖';
  margin:0 8px;
  color:rgba(255,210,170,0.35);
}
</style>
</head>
<body>

<div class="video-bg">
<video id="bgVideo" autoplay muted loop>
  <source src="./login1.mp4" type="video/mp4">
</video>
</div>
<div class="overlay"></div>

<div class="login-box" onclick="enableSound()">
  <div class="title">
    <h2>非遗传承</h2>
  </div>
  <div class="input-item">
    <label>用户名</label>
    <input type="text" id="user" placeholder="请输入账号">
  </div>
  <div class="input-item">
    <label>密码</label>
    <input type="password" id="pwd" placeholder="请输入密码">
  </div>
  <button class="login-btn" onclick="login()">登 录</button>
  <div class="tip">传千年文脉 · 承非遗匠心</div>
</div>

<script>

const bgVideo = document.getElementById('bgVideo');

function enableSound() {
  bgVideo.muted = false;
}

function login(){
  let u = document.getElementById('user').value.trim();
  let p = document.getElementById('pwd').value.trim();
  if(u==='user'&& p==='123456'){
    window.location.href = '主页.html';
  }else{
    alert('请输入用户名和密码，开启非遗文化之旅');
  }
}

</script>
</body>
</html>

      // ===== 用户登录状态 =====
    const userArea = document.querySelector('.user-area');
    const loginBtn = document.querySelector('.login-btn');
    const isLoggedIn = true; // 改为 true 查看已登录效果

    userArea.classList.toggle('logged-in', isLoggedIn);
    userArea.classList.toggle('logged-out', !isLoggedIn);

    loginBtn?.addEventListener('click', () => {
      window.location.href = './login.html';
    });
   
    // ===== 下拉框 =====
    const dropdownToggle = document.querySelector('.dropdown-toggle');
    const dropdownMenu = document.querySelector('.dropdown-menu');
    dropdownToggle.addEventListener('click', function(e) {
      e.preventDefault();
      dropdownMenu.classList.toggle('show');
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.dropdown')) {
        dropdownMenu.classList.remove('show');
      }
    });

    // ===== 右侧悬浮菜单 =====
    const trigger = document.getElementById('sideMenuTrigger');
    const sideMenu = document.getElementById('sideMenu');

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      sideMenu.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!sideMenu.contains(e.target) && !trigger.contains(e.target)) {
        sideMenu.classList.remove('open');
      }
    });

    // 点击菜单项后自动关闭
    document.querySelectorAll('.side-item').forEach(item => {
      item.addEventListener('click', () => sideMenu.classList.remove('open'));
    });

  { name:"福建茶山", type:"start", price:0, icon:"./images/tu1.png", img:"./images/tu1.png", desc:"【启程·福建茶山】云雾缭绕，茶香满坡。你在此整装出发，怀揣古法与远志，正式踏上万里茶道，获得150传承币。"},
  { name:"武夷制茶", type:"build", price:80, icon:"./images/tu2.png", img:"./images/tu2.png", desc:"【武夷制茶】岩骨花香，传承千年。你可在此习得岩茶古法，建立工坊，为商路储备好茶。"},
  { name:"景德镇", type:"build", price:100, icon:"./images/tu3.png", img:"./images/tu3.png", desc:"【瓷都景德镇】白瓷青纹，茶器相宜。茶与瓷相伴而行，既可易货获利，亦能传扬文脉。"},
  { name:"徽州木雕", type:"build", price:120, icon:"./images/tu4.png", img:"./images/tu4.png", desc:"【徽州木雕】一刀一刻皆匠心。你可学习木雕技艺，以匠心换路费，以诚意走四方。"},
  { name:"晋商镖局", type:"event", icon:"./images/tu5.png", img:"./images/tu5.png", desc:"【晋商镖局】前路多险，偶遇镖局护行。或平安获利，或遭遇波折，一切皆是商途考验。"},
  { name:"晋祠民俗", type:"build", price:120, icon:"./images/tu6.png", img:"./images/tu6.png", desc:"【晋祠民俗】三晋文脉悠长，你在此休整蓄力，感受民俗风情，为北行做好准备。"},
  { name:"张库大道", type:"tax", icon:"./images/tu7.png", img:"./images/tu7.png", desc:"【张库大道·商税】北境要道，按例缴纳商税80传承币。过关之后，便是草原门户。"},
  { name:"张家口皮毛", type:"build", price:120, icon:"./images/tu8.png", img:"./images/tu8.png", desc:"【张家口皮毛】茶马互市，以茶易皮。在此交易可获厚利，习得皮毛鞣制技艺。"},
  { name:"草原驿站", type:"park", icon:"./images/tu9.png", img:"./images/tu9.png", desc:"【草原驿站】风沙渐起，在此停驻休整，养精蓄锐，再向商都前行。"},
  { name:"库伦商都", type:"end", price:0, icon:"./images/tu10.png", img:"./images/tu10.png", desc:"【终点·库伦商都】万里茶道终抵彼岸。你以茶会友，以艺传心，成为茶道非遗传承者。"}
];

// 上下高度统一，只调左右间距
const points = [
  {x:8,  y:35}, {x:18, y:55}, {x:28, y:35}, {x:38, y:55},
  {x:48, y:35}, {x:58, y:55}, {x:68, y:35}, {x:78, y:55},
  {x:88, y:35}, {x:95, y:55}
];

const grid = document.getElementById('grid');
const moneyEl = document.getElementById('money');
const posEl = document.getElementById('pos');
const diceEl = document.getElementById('dice');
const rollBtn = document.getElementById('rollBtn');
const logEl = document.querySelector('.log');
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modalBody');
const canvas = document.getElementById('routeCanvas');
const ctx = canvas.getContext('2d');
const introCard = document.getElementById('introCard');
const bgAudio = document.getElementById('bgAudio');
const musicBtn = document.getElementById('musicBtn');
const restartBtn = document.getElementById('restartBtn');

let money = 350;
let pos = 0;
let owns = new Array(cells.length).fill(false);

function startGame(){ introCard.style.display='none'; rollBtn.disabled=false; }
function resetGame(){
  money=350; pos=0; owns=new Array(cells.length).fill(false);
  moneyEl.textContent=money; posEl.textContent=pos; logEl.innerHTML='';
  closeModal(); renderGrid(); rollBtn.disabled=false;
}
restartBtn.onclick=resetGame;

function resizeCanvas(){
  const r=canvas.parentElement.getBoundingClientRect();
  canvas.width=r.width; canvas.height=r.height; drawSLine();
}
function drawSLine(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.lineWidth=3; ctx.strokeStyle='#d4a066'; ctx.lineCap='round';
  const p=points.map(pt=>({x:pt.x*canvas.width/100,y:pt.y*canvas.height/100}));
  ctx.beginPath(); ctx.moveTo(p[0].x,p[0].y);
  for(let i=1;i<p.length;i++){
    const mx=(p[i-1].x+p[i].x)/2; const my=(p[i-1].y+p[i].y)/2;
    ctx.quadraticCurveTo(p[i-1].x,p[i-1].y,mx,my);
  }
  ctx.lineTo(p[p.length-1].x,p[p.length-1].y); ctx.stroke();
}

let playing=false;
musicBtn.onclick=()=>{
  if(!playing){ bgAudio.play(); musicBtn.classList.add('rotating');
  }else{ bgAudio.pause(); musicBtn.classList.remove('rotating'); }
  playing=!playing;
};

function renderGrid(){
  grid.innerHTML='';
  points.forEach((pt,i)=>{
    const el=document.createElement('div');
    el.className='cell'+(owns[i]?' owned':'');
    el.style.left=pt.x+'%'; el.style.top=pt.y+'%';
    el.innerHTML=`
      <img src="${cells[i].icon}" class="cell-icon">
      <div>${cells[i].name}</div>
      ${cells[i].type==='build'?`<div class="price">${cells[i].price}币</div>`:''}
    `;
    grid.appendChild(el);
  });
  document.querySelectorAll('.player').forEach(e=>e.remove());
  const p=document.createElement('div'); p.className='player';
  const cp=points[pos]; p.style.left=cp.x+'%'; p.style.top=cp.y+'%';
  grid.appendChild(p);
}

function log(text){ logEl.innerHTML+=text+'<br>'; logEl.scrollTop=logEl.scrollHeight; }
function closeModal(){ modal.classList.remove('show'); if(money>=0) rollBtn.disabled=false; }

function showTip(text){
  modalBody.innerHTML=`<div class="tip-card"><div>${text}</div><button onclick="closeModal()">确定</button></div>`;
  modal.classList.add('show');
}
function showBuy(c){
  modalBody.innerHTML=`
  <div class="card">
    <img src="${c.img}">
    <div class="info-text"><b>${c.name}</b><br><br>${c.desc}<br><br>价格：${c.price}传承币</div>
    <div class="btn-group">
      <button class="btn-yes" onclick="buy()">确定购买</button>
      <button class="btn-no" onclick="closeModal()">暂不购买</button>
    </div>
  </div>`;
  modal.classList.add('show');
}
function showLose(){
  modalBody.innerHTML=`<div class="lose-card"><h2>商路中断</h2><p>传承币耗尽，游戏失败。</p><button onclick="closeModal()">关闭</button></div>`;
  modal.classList.add('show'); rollBtn.disabled=true;
}
// 结束卡片：毛玻璃+金棕边框，文案替换为你选的诗意版本
function showWin(){
  modalBody.innerHTML=`
  <div class="win-card">
    <h2>🏆 茶道功成</h2>
    <p>你踏过万水千山，终抵商都。茶香入尘，匠心留痕，万里茶道上，从此多了一位非遗传承者。</p>
    <button onclick="closeModal()">确定</button>
  </div>`;
  modal.classList.add('show');
}

function buy(){
  const c=cells[pos]; money-=c.price; owns[pos]=true;
  moneyEl.textContent=money; log(`✅ 购入 ${c.name}`);
  closeModal(); renderGrid(); if(money<0) showLose();
}

function triggerCell(){
  const c=cells[pos]; rollBtn.disabled=true;
  // 修复：商路进度在这里更新
  posEl.textContent = pos + 1;

  if(c.type==='start'){ money+=150; showTip(c.desc); log('💸获得启动资金150'); }
  else if(c.type==='end'){ showWin(); log('抵达终点'); }
  else if(c.type==='tax'){ money-=80; showTip(c.desc); log(' 💸缴纳商税80'); }
  else if(c.type==='park'){ showTip(c.desc); log('🛖 驿站休整'); }
  else if(c.type==='event'){
    const r=Math.random(); let t;
    if(r<0.3){ money+=100; t='💸平安获利100'; }
    else if(r<0.6){ money-=70; t='💸遭遇损失70'; }
    else{ t='一路平安'; }
    showTip(c.desc+'<br><br>'+t); log(t);
  }else if(c.type==='build'){
    if(owns[pos]){ showTip(`✅ 已拥有【${c.name}】`); log('已拥有'); }
    else if(money>=c.price){ showBuy(c); }
    else{ showTip('❌ 传承币不足'); log('传承币不足'); closeModal(); }
  }
  moneyEl.textContent=money; if(money<0) showLose();
}

function move(step){
  let t=setInterval(()=>{
    pos++; if(pos>=cells.length) pos=cells.length-1;
    renderGrid(); step--;
    if(step<=0||pos===cells.length-1){ clearInterval(t); triggerCell(); }
  },200);
}

rollBtn.onclick=()=>{
  rollBtn.disabled=true;
  const pool = [1,1,1,1,1,2,2,2,3,3];
  const n = pool[Math.floor(Math.random() * pool.length)];
  
  diceEl.textContent=n; log(`🎲 掷出${n}`); move(n);
};
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
renderGrid();
rollBtn.disabled=true;
function goMyPage() {
  location.href = "../个人主页/index.html";
}
</script>
</body>
</html>
